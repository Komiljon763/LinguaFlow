<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Суратсоз</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            background:#f5f5f5;
            padding:40px;
        }

        h1{
            color:#333;
        }

        input{
            width:60%;
            padding:12px;
            font-size:18px;
            border:1px solid #ccc;
            border-radius:10px;
        }

        button{
            padding:12px 25px;
            font-size:18px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        img{
            margin-top:30px;
            width:400px;
            max-width:90%;
            border-radius:15px;
            box-shadow:0 0 15px gray;
        }
    </style>
</head>
<body>

    <h1>🤖 AI Суратсоз</h1>

    <input id="prompt" type="text"
           placeholder="Масалан: гурбаи сафед дар кайҳон">

    <br>

    <button onclick="generateImage()">
        Сурат соз
    </button>

    <div>
        <img id="result" style="display:none;">
    </div>

    <script>

        async function generateImage(){

            let text = document.getElementById("prompt").value;

            let response = await fetch("/generate-image", {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({
                    prompt:text
                })
            });

            let data = await response.json();

            document.getElementById("result").src = data.image_url;
            document.getElementById("result").style.display="block";
        }

    </script>

</body>
</html>
